# eyeon_schema_overlay.yaml
version: 1
relationships:
# This pattern needs a way to specify that its only the "root" table, not any children.
# Another option is to inject a parent "hint" during the load.
  - child_table_pattern: "metadata_*"
    parent_table: "raw_obs"
    join:
      child_col: "uuid"
      parent_col: "uuid"
    notes: "parent_uuid_hash also available for _dlt_id-level joins"

# Try pulling these from the data dictionary db I made for Wintap.
table_descriptions:
  raw_json:
    description: "Raw JSON data loaded in a single column. For debugging/global search. Note that only 1 of `json`|`json__v_text` is populated per row."
    columns:
      json:
        description: "Raw JSON source. Note that the column type is JSON, so only valid JSON is loaded here."
        search: true
      json__v_text:
        description: "Raw invalid JSON is loaded here."
  raw_obs:
    description: "Primary file observation records"
    primary_key: "uuid"
    search_field: "Filename"
  batch_info:
    description: "One row per pipeline run identifying source batch"
  json_errors:
    description: "Parse/load errors from files_resource and metadata_resource"
  metadata_mach_o_file:
    description: "Mach-O binary metadata"
  metadata_pe_file:
    description: "PE (Windows) binary metadata"
